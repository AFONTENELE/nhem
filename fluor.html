<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>As florzinhas pro meu amor</title>
    <style>
        :root {
            /* Cores do Pôr do Sol */
            --sunset-top: #2c3e50;
            --sunset-mid: #e67e22;
            --sunset-low: #f1c40f;
            --grass: #1b5e20;
        }

        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #222;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow-x: hidden;
        }

        /* Container do Jardim com Pôr do Sol */
        #garden {
            position: relative;
            width: 90vw;
            max-width: 900px;
            height: 500px;
            background: linear-gradient(to bottom, 
                var(--sunset-top) 0%, 
                #d35400 30%, 
                var(--sunset-mid) 60%, 
                var(--sunset-low) 75%, 
                var(--grass) 75%, 
                #0a2f0c 100%);
            border-radius: 20px;
            border: 8px solid #333;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Sol se pondo */
        .sun {
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, #fff7e6 0%, #f1c40f 70%, transparent 100%);
            border-radius: 50%;
            filter: blur(5px);
            opacity: 0.8;
            z-index: 1;
        }

        /* Frase Brilhante */
        .greeting-container {
            position: relative;
            z-index: 10;
            text-align: center;
            animation: fadeIn 3s ease-in forwards;
        }

        .shining-text {
            font-size: 3.5rem;
            font-weight: bold;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 10px #fff, 0 0 20px #f1c40f, 0 0 30px #e67e22;
            margin-bottom: 20px;
            display: block;
        }

        /* Botão da Coca */
        .coca-button {
            display: inline-block;
            padding: 12px 25px;
            background-color: #e31b23; /* Vermelho Coca-Cola */
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: 0.3s;
            opacity: 0;
            animation: fadeIn 2s ease-in 2s forwards; /* Aparece depois de 2 segundos */
        }

        .coca-button:hover {
            transform: scale(1.1);
            background-color: #333; /* Estilo Coca Zero */
            box-shadow: 0 0 20px rgba(255,255,255,0.4);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Estilo das Flores */
        .flower-container {
            position: absolute;
            bottom: 25%;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform-origin: bottom center;
            animation: sway 4s ease-in-out infinite alternate;
        }

        .flower-head {
            line-height: 1;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.2));
            user-select: none;
        }

        .stem {
            width: 4px;
            background: linear-gradient(to bottom, #2d5a27, #0a1f0a);
            border-radius: 2px;
            margin-top: -5px;
        }

        @keyframes sway {
            0% { transform: rotate(-3deg) translateX(-2px); }
            100% { transform: rotate(3deg) translateX(2px); }
        }

        /* Painel de Controle */
        .controls {
            margin-top: 25px;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .counter {
            font-weight: bold;
            font-size: 1.2rem;
            margin-right: 10px;
            min-width: 100px;
        }

        button.btn-ui {
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-add { background: #e67e22; color: white; }
        .btn-add:hover { background: #d35400; transform: scale(1.05); }

        .btn-clear { background: #555; color: #ccc; }
        .btn-clear:hover { background: #333; }
    </style>
</head>
<body>

    <div id="garden">
        <div class="sun"></div>
        
        <div class="greeting-container">
            <span class="shining-text">Feliz Dia da Mulher</span>
            <a href="https://www.reddit.com/r/ape/comments/17uzjrs/big_monke_flips_you_off_what_u_do/?tl=pt-pt#lightbox" 
               class="coca-button" target="_blank">
               🥤 Vale uma Coca Zero
            </a>
        </div>
    </div>

    <div class="controls">
        <div class="counter">Flores: <span id="count">0</span></div>
        <button class="btn-ui btn-add" onclick="addFlower()">✨ PLANTAR FLOR</button>
        <button class="btn-ui btn-clear" onclick="clearGarden()">RECOMEÇAR</button>
    </div>

    <script>
        const garden = document.getElementById('garden');
        const countDisplay = document.getElementById('count');
        let flowerCount = 0;

        const flowerTypes = ['🌹', '🌷', '🌻', '🌸', '🌼', '🌺'];

        function addFlower() {
            flowerCount++;
            countDisplay.innerText = flowerCount;

            const container = document.createElement('div');
            container.className = 'flower-container';

            const randomFlower = flowerTypes[Math.floor(Math.random() * flowerTypes.length)];
            const posX = Math.random() * 90 + 5; 
            const stemHeight = Math.floor(Math.random() * 80) + 20; 
            const size = Math.floor(Math.random() * 20) + 20; 
            const swayDuration = (Math.random() * 2 + 3).toFixed(2);

            container.style.left = `${posX}%`;
            container.style.animationDuration = `${swayDuration}s`;
            container.style.zIndex = 5; // Atrás da frase, na frente do sol

            const head = document.createElement('div');
            head.className = 'flower-head';
            head.innerHTML = randomFlower;
            head.style.fontSize = `${size}px`;

            const stem = document.createElement('div');
            stem.className = 'stem';
            stem.style.height = `${stemHeight}px`;

            container.appendChild(head);
            container.appendChild(stem);
            garden.appendChild(container);

            container.style.opacity = '0';
            container.style.transform = 'scale(0)';
            
            setTimeout(() => {
                container.style.transition = 'all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                container.style.opacity = '1';
                container.style.transform = 'scale(1)';
            }, 10);
        }

        function clearGarden() {
            garden.querySelectorAll('.flower-container').forEach(f => f.remove());
            flowerCount = 0;
            countDisplay.innerText = flowerCount;
            addFlower();
        }

        window.onload = () => {
            for(let i=0; i<3; i++) setTimeout(addFlower, i * 300);
        };
    </script>
</body>
</html>
